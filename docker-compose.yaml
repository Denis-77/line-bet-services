version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    environment:
      PGDATA: /var/lib/postgresql/data
    env_file:
      - .env
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 3s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: rabbitmq
    container_name: rabbitmq
    restart: always
    expose:
      - "5672"
      - "15672"
    env_file:
      - .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 5

  line-provider:
    build:
      context: ./services/line_provider
      dockerfile: Dockerfile
    container_name: line_provider_service
    command:
      - uvicorn
      - src.main:app
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    ports:
      - "8001:8000"
    restart: always
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "200k"
    depends_on:
      rabbitmq:
        condition: service_healthy

  bet-maker:
    build:
      context: ./services/bet_maker
    env_file:
      - .env

    command: [ "sh", "-c", "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000" ]
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      line-provider:
        condition: service_started

  bet-maker-worker:
    build:
      context: ./services/bet_maker
    env_file:
      - .env
    command: [ "sh", "-c", "python -m src.workers.consumer" ]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      bet-maker:
        condition: service_started

volumes:
  pg_data:
  rabbitmq_data: